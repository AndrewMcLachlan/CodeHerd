version: 2

updates:
  - package-ecosystem: "npm"
    directory: /
    schedule:
      interval: "weekly"
      timezone: Australia/Brisbane
      day: tuesday
      time: "08:00"
    groups:
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      prod-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 20

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      timezone: "Australia/Brisbane"
      day: tuesday
      time: "08:00"
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 20
